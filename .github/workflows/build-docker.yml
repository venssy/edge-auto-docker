name: Build and Push Docker to ACR

on:
  schedule:
    - cron: "0 0 * * *"  # 每天凌晨 0 点触发
  push:
    branches:
      - main           # 推送 main 分支时触发
  workflow_dispatch:   # 允许手动触发

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com  # 阿里云 ACR 地址
  IMAGE_NAME: venssy/edge-auto          # ACR 镜像路径
  TARGET_REPO: "browserless/browserless"
  TARGET_DIR: "browserless"  # 克隆目标仓库的目录

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx（支持缓存和多平台构建）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore cached last tag
        id: cache-last-tag
        uses: actions/cache@v3
        with:
          path: ./last-tag.txt
          key: last-build-tag

      # 2. 获取目标仓库的最新 Release 名称（如 "v1.2.3"）
      - name: Get Latest Release Tag
        id: release_task
        run: |
          LAST_TAG=$(cat ./last-tag.txt 2>/dev/null || echo "none")

          LATEST_TAG=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ env.TARGET_REPO }}/tags" | \
              jq -r '.[0].name')

          VERSION=$(echo "$LATEST_TAG" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | sed 's/^v//')

          if [[ -z "$VERSION" ]]; then
            echo "Error: Failed to extract version from tag '$LATEST_TAG'"
            exit 1
          else
            echo "Latest release version: $VERSION"
          fi

          echo "TAG=$VERSION" >> $GITHUB_OUTPUT

          # 4. 定时任务增量判断逻辑
          if [ "${{ github.event_name }}" == "schedule" ]; then
            [ "$LAST_TAG" -eq "$VERSION" ] && echo "should_build=false" >> $GITHUB_OUTPUT || echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

          echo "Should build: $GITHUB_OUTPUT"

      # 3. 登录阿里云 ACR（需提前在 GitHub Secrets 中配置 ACR_USERNAME 和 ACR_PASSWORD）
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 5. 恢复 Docker 缓存（加速构建）
      - name: Restore Docker cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 6. 构建 Docker 镜像（仅在 Push/手动触发 或 基础镜像更新时）
      - name: Build Docker image
        if: steps.release_task.outputs.should_build == 'true'
        run: |
          # 1. 拉取目标仓库代码到子目录
          git clone --depth 1 https://github.com/${{ env.TARGET_REPO }} ${{ env.TARGET_DIR }}

          cd ${{ env.TARGET_DIR }}

          docker buildx build \
            -f docker/base/Dockerfile \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache \
            --tag ghcr.io/browserless/base:latest \
            --load .

          # docker tag browserless/base:latest ghcr.io/browserless/base:latest

          docker buildx build \
            -f docker/edge/Dockerfile \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache \
            --tag ghcr.io/browserless/base:latest \
            --load .

          # docker tag browserless/edge:latest ghcr.io/browserless/edge:latest

          cd ..
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.release_task.outputs.TAG }} \
            --push .

          echo "${{ steps.release_task.outputs.TAG }}" > ./last-tag.txt

      - name: Save new last tag to cache
        if: steps.release_task.outputs.should_build == 'true'
        uses: actions/cache@v3
        with:
          path: ./last-tag.txt
          key: last-build-tag

      # 7. 保存 Docker 缓存（供下次构建使用）
      - name: Save Docker cache
        if: always()  # 无论构建成功与否都保存缓存
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
