name: Build and Push Docker to ACR

on:
  schedule:
    - cron: "0 0 * * *"  # 每天凌晨 0 点触发
  push:
    branches:
      - main           # 推送 main 分支时触发
  workflow_dispatch:   # 允许手动触发

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com  # 阿里云 ACR 地址
  IMAGE_NAME: venssy/edge-auto          # ACR 镜像路径
  TARGET_BASE_IMAGE: ghcr.io/browserless/chromium:latest                # 基础镜像（用于检测更新）

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx（支持缓存和多平台构建）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录阿里云 ACR（需提前在 GitHub Secrets 中配置 ACR_USERNAME 和 ACR_PASSWORD）
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. 检测基础镜像是否更新（可选）
      - name: Check if base image is updated
        id: check-base-image
        run: |
          # 尝试拉取最新基础镜像（如果失败则跳过重新构建）
          if docker pull ${{ env.TARGET_BASE_IMAGE }} 2>/dev/null; then
            echo "Base image is updated or exists. Proceed to build."
            echo "REBUILD_REQUIRED=true" >> $GITHUB_ENV
          else
            echo "Base image is unchanged or not found. Skip rebuild."
            echo "REBUILD_REQUIRED=false" >> $GITHUB_ENV
          fi

      # 5. 恢复 Docker 缓存（加速构建）
      - name: Restore Docker cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 6. 构建 Docker 镜像（仅在 Push/手动触发 或 基础镜像更新时）
      - name: Build Docker image
        if: |
          github.event_name == 'push' || 
          github.event_name == 'workflow_dispatch' || 
          env.REBUILD_REQUIRED == 'true'
        run: |
          docker buildx build \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --push .

      # 7. 保存 Docker 缓存（供下次构建使用）
      - name: Save Docker cache
        if: always()  # 无论构建成功与否都保存缓存
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
